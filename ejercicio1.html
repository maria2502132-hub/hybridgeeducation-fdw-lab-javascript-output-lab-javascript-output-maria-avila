<head>
    <meta charset="utf-8">
    <title>Actualizar Texto</title>
</head>

<body>
    <h1 id="mensaje">texto original</h1>
    <button onclick="actualizarTexto()">Actualizar Texto</button>

    <script>
        function actualizarTexto() {
            document.getElementById("mensaje").innerHTML = "¡Texto actualizado!";
        }
    </script>
</body>
