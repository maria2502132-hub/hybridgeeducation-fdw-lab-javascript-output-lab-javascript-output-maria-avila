<head>
    <meta charset="UTF-8">
    <title>Demostración de Output en Javascript</title>
</head>
<body>

    <h1>Demostración de Output en Javascript</h1>

    <button onclick="mostrarNombre()">
        Mostrar nombre
    </button>

    <br><br>

    <p id="mensaje"></p>

    <button onclick="actualizarTexto()">
        Actualizar texto
    </button>

    <script>
        // Mensaje en la consola al cargar la página
        console.log("La página se ha cargado correctamente.");

        // Función para mostrar una alerta con tu nombre
        function mostrarNombre() {
            alert("Dany Avila");
        }

        // Función para cambiar el texto del párrafo
        function actualizarTexto() {
            document.getElementById("mensaje").textContent =
                "¡Texto actualizado con Javascript!";
        }
    </script>

</body>
</html>
